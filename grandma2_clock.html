
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  .ma-wrap {
    background: #000;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    border: 2px solid #c89000;
    border-radius: 4px;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    margin: 1rem 0;
  }

  .ma-header {
    background: #0018cc;
    color: #fff;
    font-family: Arial, sans-serif;
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    padding: 7px 0;
    border-bottom: 2px solid #c89000;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .ma-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #ffe066, #c89000 80%);
    flex-shrink: 0;
  }

  .ma-body {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px 24px 22px;
  }

  .ma-time {
    color: #ffb200;
    font-size: clamp(60px, 12vw, 110px);
    letter-spacing: 4px;
    line-height: 1;
    text-shadow:
      0 0 6px #ffb200,
      0 0 18px rgba(255,178,0,0.45);
    user-select: none;
  }

  .ma-sep {
    opacity: 1;
    transition: opacity 0.08s;
    margin: 0 2px;
  }

  .ma-sep.off {
    opacity: 0.1;
  }

  .ma-footer {
    background: #111;
    border-top: 1px solid #333;
    color: #666;
    font-family: Arial, sans-serif;
    font-size: 11px;
    text-align: right;
    padding: 3px 10px;
    letter-spacing: 0.5px;
  }
</style>

<div class="ma-wrap">
  <div class="ma-header">
    <div class="ma-dot"></div>
    Clock
  </div>
  <div class="ma-body">
    <div class="ma-time" id="clk">
      <span id="hh">00</span><span class="ma-sep" id="s1">:</span><span id="mm">00</span><span class="ma-sep" id="s2">:</span><span id="ss">00</span>
    </div>
  </div>
  <div class="ma-footer" id="tz">TZ: —</div>
</div>

<script>
  const hh = document.getElementById('hh');
  const mm = document.getElementById('mm');
  const ss = document.getElementById('ss');
  const s1 = document.getElementById('s1');
  const s2 = document.getElementById('s2');
  const tz = document.getElementById('tz');

  tz.textContent = 'TZ: ' + Intl.DateTimeFormat().resolvedOptions().timeZone;

  let sep = true;
  function tick() {
    const n = new Date();
    hh.textContent = String(n.getHours()).padStart(2,'0');
    mm.textContent = String(n.getMinutes()).padStart(2,'0');
    ss.textContent = String(n.getSeconds()).padStart(2,'0');
    sep = !sep;
    s1.className = 'ma-sep' + (sep ? '' : ' off');
    s2.className = 'ma-sep' + (sep ? '' : ' off');
  }
  tick();
  setInterval(tick, 1000);
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MA2 Clock</title>

<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Digital-7 Mono', monospace;
}

.clock-container{
    width:95vw;
    border:2px solid #d8a500;
    box-shadow:
        0 0 10px rgba(255,180,0,.5),
        inset 0 0 10px rgba(255,180,0,.15);
}

.header{
    height:42px;
    background:#0017c8;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    font-weight:bold;
    font-size:16px;
    border-bottom:2px solid #d8a500;
}

.clock{
    height:calc(100vh - 80px);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#ffb400;
    font-size:18vw;
    letter-spacing:10px;

    text-shadow:
        0 0 10px #ffb400,
        0 0 20px #ffb400,
        0 0 30px rgba(255,180,0,.5);
}

.blink{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:.2;
    }
}
</style>
</head>

<body>

<div class="clock-container">
    <div class="header">
        Clock
    </div>

    <div class="clock" id="clock">
        00<span class="blink">:</span>00<span class="blink">:</span>00
    </div>
</div>

<script>

function updateClock(){

    const now = new Date();

    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');

    document.getElementById('clock').innerHTML =
        `${h}<span class="blink">:</span>${m}<span class="blink">:</span>${s}`;
}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
